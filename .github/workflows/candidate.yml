name: Candidate

on:
  push:
    branches:
      - main
      - "ci/**"

permissions:
  contents: read
  packages: write

concurrency:
  group: candidate-${{ github.ref }}
  cancel-in-progress: true

env:
  FE_IMAGE: ghcr.io/${{ github.repository_owner }}/k8s-demo-fr
  BE_IMAGE: ghcr.io/${{ github.repository_owner }}/k8s-demo-be

jobs:
  prepare-version:
    name: Prepare candidate version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.export.outputs.app_version }}
      image_tag: ${{ steps.export.outputs.image_tag }}
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Debug git state
        run: |
          git branch -a
          git tag
          git log --oneline --decorate -20
          echo >> "Gitversion.yml"
          cat GitVersion.yml

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: version
        uses: gittools/actions/gitversion/execute@v3

      - name: Export candidate metadata
        id: export
        run: |
          echo "app_version=${{ steps.version.outputs.semVer }}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ steps.version.outputs.semVer }}" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and push candidate images
    runs-on: ubuntu-latest
    needs: prepare-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build candidate images
        env:
          APP_VERSION: ${{ needs.prepare-version.outputs.app_version }}
          IMAGE_TAG: ${{ needs.prepare-version.outputs.image_tag }}
          FE_IMAGE: ${{ env.FE_IMAGE }}
          BE_IMAGE: ${{ env.BE_IMAGE }}
        run: make docker-build

      - name: Push candidate images
        env:
          APP_VERSION: ${{ needs.prepare-version.outputs.app_version }}
          IMAGE_TAG: ${{ needs.prepare-version.outputs.image_tag }}
          FE_IMAGE: ${{ env.FE_IMAGE }}
          BE_IMAGE: ${{ env.BE_IMAGE }}
        run: docker compose -f ops/docker/compose.yaml push
