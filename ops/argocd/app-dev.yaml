apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-demo-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/R0bes/k8s-demo.git
    targetRevision: ci/versioning
    path: ops/helm
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: k8s-demo-dev

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
