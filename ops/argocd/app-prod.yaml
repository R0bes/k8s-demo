apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-demo-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/R0bes/k8s-demo.git
    targetRevision: main
    path: ops/helm
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: k8s-demo-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
