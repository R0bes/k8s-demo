name: Versioning

on:
  workflow_call:
    outputs:
      semver:
        description: "Semantic version"
        value: ${{ jobs.version.outputs.semver }}
      full-semver:
        description: "Full semantic version"
        value: ${{ jobs.version.outputs.full-semver }}
      major-minor-patch:
        description: "Major.Minor.Patch"
        value: ${{ jobs.version.outputs.major-minor-patch }}
      short-sha:
        description: "Short SHA"
        value: ${{ jobs.version.outputs.short-sha }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.gitversion.outputs.SemVer }}
      full-semver: ${{ steps.gitversion.outputs.FullSemVer }}
      major-minor-patch: ${{ steps.gitversion.outputs.MajorMinorPatch }}
      short-sha: ${{ steps.gitversion.outputs.ShortSha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Debug git state
        run: |
          git branch -a
          git tag
          git log --oneline --decorate -20

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Execute GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Show version info
        run: |
          echo "SemVer=${{ steps.gitversion.outputs.SemVer }}"
          echo "FullSemVer=${{ steps.gitversion.outputs.FullSemVer }}"
          echo "MajorMinorPatch=${{ steps.gitversion.outputs.MajorMinorPatch }}"
          echo "ShortSha=${{ steps.gitversion.outputs.ShortSha }}"
