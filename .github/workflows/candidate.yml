name: Candidate

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: candidate-${{ github.ref }}
  cancel-in-progress: true

env:
  FE_IMAGE: ghcr.io/r0bes/k8s-demo-fe
  BE_IMAGE: ghcr.io/r0bes/k8s-demo-be

jobs:
  prepare-version:
    name: Prepare candidate version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.export.outputs.app_version }}
      majorMinorPatch: ${{ steps.export.outputs.majorMinorPatch }}
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Debug git state
        run: |
          git branch -a
          git tag
          git log --oneline --decorate -20
          echo >> "Gitversion.yml"
          cat GitVersion.yml

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: version
        uses: gittools/actions/gitversion/execute@v4

      - name: Export candidate metadata
        id: export
        run: |
          echo "semVer=${{ steps.version.outputs.semVer }}" >> "$GITHUB_OUTPUT"
          echo "majorMinorPatch=${{ steps.version.outputs.majorMinorPatch }}" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and push candidate images
    runs-on: ubuntu-latest
    needs: prepare-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create env file
        run: |
          sed -i "s|^APP_VERSION=.*|APP_VERSION=${{ needs.prepare-version.outputs.semVer }}|" .env
          sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ needs.prepare-version.outputs.majorMinorPatch }}-candidate.${{ github.run_number }}|" .env
          sed -i "s|^FE_IMAGE=.*|FE_IMAGE=${{ env.FE_IMAGE }}|" .env
          sed -i "s|^BE_IMAGE=.*|BE_IMAGE=${{ env.BE_IMAGE }}|" .env

      - name: Build candidate images
        run: make docker-build

      - name: Push candidate images
        run: docker compose -f ./ops/compose/docker-compose.yml push
