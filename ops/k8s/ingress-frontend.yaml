apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-demo-frontend
  namespace: k8s-demo
spec:
  ingressClassName: nginx
  rules:
    - host: k8s-demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
