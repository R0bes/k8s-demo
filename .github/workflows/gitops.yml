name: GitOps

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Final release tag, e.g. 0.1.1"
        required: true
        type: string

permissions:
  contents: write

env:
  FE_IMAGE: ghcr.io/r0bes/k8s-demo-fe
  BE_IMAGE: ghcr.io/r0bes/k8s-demo-be

jobs:
  update-gitops:
    name: Update GitOps manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure backend release tag exists
        run: |
          if ! docker manifest inspect "${BE_IMAGE}:${{ inputs.release_tag }}" >/dev/null 2>&1; then
            echo "Backend release tag does not exist: ${{ inputs.release_tag }}"
            exit 1
          fi

      - name: Ensure frontend release tag exists
        run: |
          if ! docker manifest inspect "${FE_IMAGE}:${{ inputs.release_tag }}" >/dev/null 2>&1; then
            echo "Frontend release tag dows not exist: ${{ inputs.release_tag }}"
            exit 1
          fi

      - name: Update release tag in Helm values
        run: |
          RELEASE_TAG="${{ inputs.release_tag }}"
          sed -i '/frontend:/,/tag:/ s|^\([[:space:]]*tag:[[:space:]]*\).*|\1'"${RELEASE_TAG}"'|' ops/helm/values-prod.yaml
          sed -i '/backend:/,/tag:/ s|^\([[:space:]]*tag:[[:space:]]*\).*|\1'"${RELEASE_TAG}"'|' ops/helm/values-prod.yaml

      - name: Show changes
        run: git diff

      - name: Commit and push changes
        run: |
          RELEASE_TAG="${{ inputs.release_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ops/helm/values.yaml

          if git diff --cached --quiet; then
            echo "No GitOps changes to commit."
            exit 0
          fi

          git commit -m "chore(gitops): update release to ${RELEASE_TAG}"
          git push origin HEAD:main

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(gitops): update release to ${{ inputs.release_tag }}"
          branch: "gitops/release-${{ inputs.release_tag }}"
          delete-branch: true
          title: "chore(gitops): update release to ${{ inputs.release_tag }}"
          body: |
            Automated GitOps update for release `${{ inputs.release_tag }}`.
          base: main
