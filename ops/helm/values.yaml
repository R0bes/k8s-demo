namespace: k8s-demo

postgres:
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent

  database: appdb
  user: appuser
  password: apppassword

  service:
    port: 5432

  persistence:
    size: 1Gi

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/r0bes/k8s-demo-be
    tag: dev
    pullPolicy: IfNotPresent
  service:
    port: 8000
  database:
    host: postgres
    port: 5432
    name: appdb

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/r0bes/k8s-demo-fe
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3000
  apiUrl: /api

ingress:
  enabled: true
  className: nginx
  host: k8s-demo.local
