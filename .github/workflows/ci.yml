name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "bugfix/**"
      - "chore/**"
      - "ci/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_VERSION: ci-${{ github.sha }}

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        env:
          DB_URL: sqlite:///./test.db
          APP_VERSION: ${{ env.APP_VERSION }}
        run: pytest

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ env.APP_VERSION }}
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  integration-smoke:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create env file
        run: |
          sed -i "s/^APP_VERSION=.*/APP_VERSION=${{ env.APP_VERSION }}/" .env
          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ env.APP_VERSION }}/" .env

      - name: Build containers
        run: make docker-build

      - name: Run compose stack
        run: make compose-up

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Check backend version
        run: |
          ACTUAL_BE_VERSION="$(curl -fsS http://localhost:8000/version | python -c "import sys, json; print(json.load(sys.stdin)['version'])")"
          echo "Backend version: $ACTUAL_BE_VERSION"
          test "$ACTUAL_BE_VERSION" = "${{ env.APP_VERSION }}"

      - name: Check frontend version
        run: |
          ACTUAL_FE_VERSION="$(curl -fsS http://localhost:3000 | grep -oP 'Frontend:\s*<!-- -->\K[^<]+')"
          echo "Frontend version: $ACTUAL_FE_VERSION"
          test "$ACTUAL_FE_VERSION" = "${{ env.APP_VERSION }}"

      - name: Stop stack
        if: always()
        run: make compose-down-v
