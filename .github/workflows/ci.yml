name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "bugfix/**"
      - "chore/**"
      - "ci/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_VERSION: ci-${{ github.sha }}

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        env:
          DB_URL: sqlite:///./test.db
          APP_VERSION: ${{ env.APP_VERSION }}
        run: pytest

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ env.APP_VERSION }}
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  integration-smoke:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          cat >> ci.env <<EOF
          APP_VERSION=${{ env.APP_VERSION }}
          IMAGE_TAG=${{ env.APP_VERSION }}
          EOF

      - name: Build containers
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: docker compose -f ./ops/compose/docker-compose.yml --env-file ci.env build

      - name: Run compose stack
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: docker compose -f ./ops/compose/docker-compose.yml --env-file ci.env up -d

      - name: Show compose status
        run: docker compose -f ./ops/compose/docker-compose.yml --env-file ci.env ps -a

      - name: Inspect backend container
        run: docker inspect k8s-demo-be

      - name: Show backend state
        run: docker inspect --format='{{json .State}}' k8s-demo-be

      - name: Log compose
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: docker compose -f ./ops/compose/docker-compose.yml --env-file ci.env logs

      - name: Log compose
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: docker compose -f ./ops/compose/docker-compose.yml --env-file ci.env logs backend

      - name: Log compose
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: docker logs k8s-demo-be


      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Check backend version endpoint
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: curl -fsS http://localhost:8000/version | grep "$APP_VERSION"

      - name: Check frontend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Stop stack
        if: always()
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: docker compose -f ./ops/compose/docker-compose.yml --env-file ci.env down -v
