name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "bugfix/**"
      - "chore/**"
      - "ci/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_VERSION: ci-${{ github.sha }}

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        env:
          DB_URL: sqlite:///./test.db
          APP_VERSION: ${{ env.APP_VERSION }}
        run: pytest

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ env.APP_VERSION }}
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  integration-smoke:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create candidate env file
        run: |
          cat > .env.candidate <<EOF
          APP_NAME=k8s-demo
          APP_VERSION=${{ env.APP_VERSION }}
          IMAGE_TAG=${{ env.APP_VERSION }}
          FE_IMAGE=ghcr.io/${{ github.repository_owner }}/k8s-demo-fr
          BE_IMAGE=ghcr.io/${{ github.repository_owner }}/k8s-demo-be
          FE_PORT=3000
          BE_PORT=8000
          DB_PORT=5432
          DB_NAME=demo-db
          DB_USER=demo-user
          DB_PASSWORD=demo-password
          EOF

      - name: Build containers
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: make docker-build

      - name: Run compose stack
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: make compose-up

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Check backend version endpoint
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: curl -fsS http://localhost:8000/version | grep "$APP_VERSION"

      - name: Check frontend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Stop stack
        if: always()
        run: docker compose-down-v
