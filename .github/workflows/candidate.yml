name: Candidate

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!ops/helm/values-prod.yaml'

permissions:
  contents: write
  packages: write

concurrency:
  group: candidate-${{ github.ref }}
  cancel-in-progress: true

env:
  FE_IMAGE: ghcr.io/r0bes/k8s-demo-fe
  BE_IMAGE: ghcr.io/r0bes/k8s-demo-be

jobs:
  prepare-version:
    name: Prepare candidate version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.export.outputs.app_version }}
      majorMinorPatch: ${{ steps.export.outputs.majorMinorPatch }}
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Debug git state
        run: |
          git branch -a
          git tag
          git log --oneline --decorate -20
          echo >> "Gitversion.yml"
          cat GitVersion.yml

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: version
        uses: gittools/actions/gitversion/execute@v4

      - name: Export candidate metadata
        id: export
        run: |
          echo "semVer=${{ steps.version.outputs.semVer }}" >> "$GITHUB_OUTPUT"
          echo "majorMinorPatch=${{ steps.version.outputs.majorMinorPatch }}" >> "$GITHUB_OUTPUT"


  bump-versions:
    name: Bump version in source
    runs-on: ubuntu-latest
    needs: prepare-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Bump pyproject.toml version
        run: |
          uv version --project app/backend ${{ needs.prepare-version.outputs.majorMinorPatch }}

      - name: Bump Chart.yaml appVersion
        run: |
          sed -i "s|^version:.*|version: \"${{ needs.prepare-version.outputs.majorMinorPatch }}\"|" ops/helm/Chart.yaml
          sed -i "s|^appVersion:.*|appVersion: \"${{ needs.prepare-version.outputs.majorMinorPatch }}\"|" ops/helm/Chart.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/backend/pyproject.toml ops/helm/Chart.yaml
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore: bump version to ${{ needs.prepare-version.outputs.majorMinorPatch }} [skip ci]"
          git push origin main


  build-and-push:
    name: Build and push candidate images
    runs-on: ubuntu-latest
    needs: [prepare-version, bump-versions]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create env file
        run: |
          sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ needs.prepare-version.outputs.majorMinorPatch }}-rc.${{ github.run_number }}|" .env
          sed -i "s|^FE_IMAGE=.*|FE_IMAGE=${{ env.FE_IMAGE }}|" .env
          sed -i "s|^BE_IMAGE=.*|BE_IMAGE=${{ env.BE_IMAGE }}|" .env

      - name: Build candidate images
        run: make docker-build

      - name: Push candidate images
        run: docker compose -f ./ops/compose/docker-compose.yml --env-file .env push
