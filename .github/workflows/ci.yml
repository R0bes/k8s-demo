name: CI

on:
  pull_request:
  push:
    branches:
      - "feature/**"
      - "bugfix/**"
      - "chore/**"
      - "ci/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_VERSION: ci-${{ github.sha }}

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: make setup-be

      - name: Run tests
        run: make check-be

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: make setup-fe

      - name: Run tests
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ env.APP_VERSION }}
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: make check-fe

  integration-smoke:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create env file
        run: |
          sed -i "s/^APP_VERSION=.*/APP_VERSION=${{ env.APP_VERSION }}/" .env
          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ env.APP_VERSION }}/" .env

      - name: Build containers
        run: make docker-build

      - name: Run compose stack
        run: make compose-up

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Check frontend version
        run: |
          ACTUAL_FE_VERSION="$(curl -fsS http://localhost:3000 | grep -oP 'Frontend:\s*<!-- -->\K[^<]+')"
          echo "Frontend version: $ACTUAL_FE_VERSION"
          test "$ACTUAL_FE_VERSION" = "${{ env.APP_VERSION }}"

      - name: Stop stack
        if: always()
        run: make compose-down-v


  bump-versions:
    name: Bump version in source
    runs-on: ubuntu-latest
    needs: [integration-smoke]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.CI_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: version
        uses: gittools/actions/gitversion/execute@v4
        with:
          overrideConfig: |
            branch-name=${{ github.head_ref }}

      - name: Bump versions
        run: |
          uv version --project app/backend ${{ steps.version.outputs.majorMinorPatch }}
          uv lock --project app/backend
          npm version ${{ steps.version.outputs.majorMinorPatch }} --no-git-tag-version --prefix app/frontend
          sed -i "s|^version:.*|version: ${{ steps.version.outputs.majorMinorPatch }}|" ops/helm/Chart.yaml
          sed -i "s|^appVersion:.*|appVersion: \"${{ steps.version.outputs.majorMinorPatch }}\"|" ops/helm/Chart.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/backend/pyproject.toml uv.lock
          git add app/frontend/package.json
          git add ops/helm/Chart.yaml
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore: bump version to ${{ steps.version.outputs.majorMinorPatch }} [skip ci]"
          git push origin ${{ github.head_ref }}
